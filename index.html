<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
        <meta name="apple-mobile-web-app-capable" content="yes" />
        <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
        <meta name="apple-mobile-web-app-title" content="Rootine - Grow Journal" />
        <meta name="theme-color" content="#1a1a1a" />
        <title>Rootine</title>
      <script type="module" crossorigin src="/rootine/assets/index-hXlaf68g.js"></script>
      <link rel="stylesheet" crossorigin href="/rootine/assets/index-2bafQPCk.css">
    </head>
    <body>
        <div id="app">
            <div id="header">
                <div class="header-row">
                    <h1>🌱 Rootine</h1>
                    <button class="new-cycle-btn" onclick="newCycle()">+ New Cycle</button>
                </div>
                <div class="subtitle" id="grow-age"></div>
            </div>
            <div id="content">
                <div id="section-log" class="section active">
                    <div id="log-list"></div>
                </div>

                <div id="section-add" class="section">
                    <div class="form-section">
                        <div class="form-section-title">Date &amp; time</div>
                        <input type="datetime-local" class="form-input form-input-full" id="new-dt" />
                    </div>

                    <div class="form-section">
                        <div class="form-section-title">Nutrients &amp; water</div>
                        <div class="plant-tabs" id="plant-tabs">
                            <div class="plant-tab active" onclick="switchPlant('COP')">COP</div>
                            <div class="plant-tab" onclick="switchPlant('H')">H</div>
                            <div class="plant-tab" onclick="switchPlant('GC')">GC</div>
                            <div class="plant-tab" onclick="switchPlant('GC2')">GC2</div>
                        </div>
                        <div id="plant-panels">
                            <div class="plant-panel active" id="panel-COP">
                                <div class="form-row"><label class="form-label">Fish (cups)</label><input class="form-input" type="number" min="0" step="0.5" placeholder="0" id="COP-fish" /></div>
                                <div class="form-row"><label class="form-label">Grow (cups)</label><input class="form-input" type="number" min="0" step="0.5" placeholder="0" id="COP-grow" /></div>
                                <div class="form-row"><label class="form-label">Bloom (cups)</label><input class="form-input" type="number" min="0" step="0.5" placeholder="0" id="COP-bloom" /></div>
                                <div class="form-row"><label class="form-label">Water (cups)</label><input class="form-input" type="number" min="0" step="0.5" placeholder="0" id="COP-water" /></div>
                            </div>
                            <div class="plant-panel" id="panel-H">
                                <div class="form-row"><label class="form-label">Fish (cups)</label><input class="form-input" type="number" min="0" step="0.5" placeholder="0" id="H-fish" /></div>
                                <div class="form-row"><label class="form-label">Grow (cups)</label><input class="form-input" type="number" min="0" step="0.5" placeholder="0" id="H-grow" /></div>
                                <div class="form-row"><label class="form-label">Bloom (cups)</label><input class="form-input" type="number" min="0" step="0.5" placeholder="0" id="H-bloom" /></div>
                                <div class="form-row"><label class="form-label">Water (cups)</label><input class="form-input" type="number" min="0" step="0.5" placeholder="0" id="H-water" /></div>
                            </div>
                            <div class="plant-panel" id="panel-GC">
                                <div class="form-row"><label class="form-label">Fish (cups)</label><input class="form-input" type="number" min="0" step="0.5" placeholder="0" id="GC-fish" /></div>
                                <div class="form-row"><label class="form-label">Grow (cups)</label><input class="form-input" type="number" min="0" step="0.5" placeholder="0" id="GC-grow" /></div>
                                <div class="form-row"><label class="form-label">Bloom (cups)</label><input class="form-input" type="number" min="0" step="0.5" placeholder="0" id="GC-bloom" /></div>
                                <div class="form-row"><label class="form-label">Water (cups)</label><input class="form-input" type="number" min="0" step="0.5" placeholder="0" id="GC-water" /></div>
                            </div>
                            <div class="plant-panel" id="panel-GC2">
                                <div class="form-row"><label class="form-label">Fish (cups)</label><input class="form-input" type="number" min="0" step="0.5" placeholder="0" id="GC2-fish" /></div>
                                <div class="form-row"><label class="form-label">Grow (cups)</label><input class="form-input" type="number" min="0" step="0.5" placeholder="0" id="GC2-grow" /></div>
                                <div class="form-row"><label class="form-label">Bloom (cups)</label><input class="form-input" type="number" min="0" step="0.5" placeholder="0" id="GC2-bloom" /></div>
                                <div class="form-row"><label class="form-label">Water (cups)</label><input class="form-input" type="number" min="0" step="0.5" placeholder="0" id="GC2-water" /></div>
                            </div>
                        </div>
                    </div>

                    <div class="form-section">
                        <div class="form-section-title">Actions</div>
                        <div class="checkbox-row" style="flex-wrap: wrap; cursor: default">
                            <label style="display: flex; align-items: center; gap: 10px; width: 100%; cursor: pointer"> <input type="checkbox" id="ck-lst" onchange="togglePlantPicker('lst')" /> LST </label>
                            <div id="lst-plants" style="display: none; width: 100%; padding: 8px 0 10px 30px">
                                <div style="font-size: 12px; color: var(--muted); margin-bottom: 6px">Which plants?</div>
                                <div style="display: flex; gap: 8px; flex-wrap: wrap">
                                    <label class="plant-picker-opt"><input type="checkbox" class="lst-plant" value="COP" /> COP</label>
                                    <label class="plant-picker-opt"><input type="checkbox" class="lst-plant" value="H" /> H</label>
                                    <label class="plant-picker-opt"><input type="checkbox" class="lst-plant" value="GC" /> GC</label>
                                    <label class="plant-picker-opt"><input type="checkbox" class="lst-plant" value="GC2" /> GC2</label>
                                </div>
                            </div>
                        </div>
                        <div class="checkbox-row" style="flex-wrap: wrap; cursor: default">
                            <label style="display: flex; align-items: center; gap: 10px; width: 100%; cursor: pointer"> <input type="checkbox" id="ck-def" onchange="togglePlantPicker('def')" /> Defoliate </label>
                            <div id="def-plants" style="display: none; width: 100%; padding: 8px 0 10px 30px">
                                <div style="font-size: 12px; color: var(--muted); margin-bottom: 6px">Which plants?</div>
                                <div style="display: flex; gap: 8px; flex-wrap: wrap">
                                    <label class="plant-picker-opt"><input type="checkbox" class="def-plant" value="COP" /> COP</label>
                                    <label class="plant-picker-opt"><input type="checkbox" class="def-plant" value="H" /> H</label>
                                    <label class="plant-picker-opt"><input type="checkbox" class="def-plant" value="GC" /> GC</label>
                                    <label class="plant-picker-opt"><input type="checkbox" class="def-plant" value="GC2" /> GC2</label>
                                </div>
                            </div>
                        </div>
                        <div class="checkbox-row" style="flex-wrap: wrap; cursor: default">
                            <label style="display: flex; align-items: center; gap: 10px; width: 100%; cursor: pointer"> <input type="checkbox" id="ck-repot" onchange="togglePlantPicker('repot')" /> Repot / transplant </label>
                            <div id="repot-plants" style="display: none; width: 100%; padding: 8px 0 10px 30px">
                                <div style="font-size: 12px; color: var(--muted); margin-bottom: 6px">Which plants?</div>
                                <div style="display: flex; gap: 8px; flex-wrap: wrap">
                                    <label class="plant-picker-opt"><input type="checkbox" class="repot-plant" value="COP" /> COP</label>
                                    <label class="plant-picker-opt"><input type="checkbox" class="repot-plant" value="H" /> H</label>
                                    <label class="plant-picker-opt"><input type="checkbox" class="repot-plant" value="GC" /> GC</label>
                                    <label class="plant-picker-opt"><input type="checkbox" class="repot-plant" value="GC2" /> GC2</label>
                                </div>
                            </div>
                        </div>
                        <div class="checkbox-row" style="flex-wrap: wrap; cursor: default" id="light-row">
                            <label style="display: flex; align-items: center; gap: 10px; width: 100%; cursor: pointer"> <input type="checkbox" id="ck-light" onchange="toggleLightInputs()" /> Light adjusted </label>
                            <div id="light-inputs" style="display: none; width: 100%; padding: 10px 0 4px 30px">
                                <div class="form-row" style="margin-bottom: 8px">
                                    <label class="form-label" style="font-size: 13px; color: var(--muted)">Lux</label>
                                    <input class="form-input" type="number" min="0" step="500" id="light-lux" placeholder="0" style="width: 100px" oninput="saveLightDefaults()" />
                                </div>
                                <div class="form-row" style="margin-bottom: 0">
                                    <label class="form-label" style="font-size: 13px; color: var(--muted)">Distance (cm)</label>
                                    <input class="form-input" type="number" min="0" step="1" id="light-dist" placeholder="0" style="width: 100px" oninput="saveLightDefaults()" />
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="form-section">
                        <div class="form-section-title">Observations</div>
                        <textarea class="form-input" id="new-obs" placeholder="Nute burn, yellowing, pests, smell, stretch…"></textarea>
                    </div>

                    <button class="submit-btn" onclick="saveEntry()">Save entry</button>
                </div>

                <div id="section-stats" class="section">
                    <div id="stats-cycle-toggle-container"></div>
                    <div class="stat-grid">
                        <div class="stat-card">
                            <div class="stat-val green" id="s-feeds">—</div>
                            <div class="stat-lbl">Feed sessions</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-val blue" id="s-waters">—</div>
                            <div class="stat-lbl">Water sessions</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-val" id="s-days">—</div>
                            <div class="stat-lbl">Days logged</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-val amber" id="s-issues">—</div>
                            <div class="stat-lbl">Observations</div>
                        </div>
                    </div>

                    <div class="section-title">Total nutrients per plant</div>
                    <div class="form-section" id="nute-totals" style="margin-bottom: 14px"></div>

                    <div class="section-title">All observations</div>
                    <div id="obs-list"></div>
                </div>
            </div>

            <div id="tabs">
                <button class="tab-btn active" onclick="showTab('log')" id="tab-log">
                    <svg viewBox="0 0 24 24">
                        <path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2" />
                        <rect x="9" y="3" width="6" height="4" rx="2" />
                        <line x1="9" y1="12" x2="15" y2="12" />
                        <line x1="9" y1="16" x2="13" y2="16" />
                    </svg>
                    Log
                </button>
                <button class="tab-btn" onclick="showTab('add')" id="tab-add">
                    <svg viewBox="0 0 24 24">
                        <circle cx="12" cy="12" r="9" />
                        <line x1="12" y1="8" x2="12" y2="16" />
                        <line x1="8" y1="12" x2="16" y2="12" />
                    </svg>
                    Add
                </button>
                <button class="tab-btn" onclick="showTab('stats')" id="tab-stats">
                    <svg viewBox="0 0 24 24">
                        <line x1="18" y1="20" x2="18" y2="10" />
                        <line x1="12" y1="20" x2="12" y2="4" />
                        <line x1="6" y1="20" x2="6" y2="14" />
                    </svg>
                    Stats
                </button>
            </div>
        </div>

        <div id="new-cycle-modal" style="display: none; position: fixed; inset: 0; background: rgba(0, 0, 0, 0.6); z-index: 100; align-items: center; justify-content: center; padding: 24px">
            <div style="background: var(--surface); border: 0.5px solid var(--border2); border-radius: 16px; padding: 20px; width: 100%; max-width: 320px">
                <div style="font-size: 15px; font-weight: 600; margin-bottom: 14px">New Grow Cycle</div>
                <input id="new-cycle-input" type="text" class="form-input form-input-full" placeholder="Grow #2" style="margin-bottom: 14px" />
                <div style="display: flex; gap: 8px">
                    <button onclick="cancelNewCycle()" style="flex: 1; padding: 11px; background: var(--surface2); border: 0.5px solid var(--border2); border-radius: 10px; color: var(--muted); font-size: 14px; cursor: pointer">Cancel</button>
                    <button onclick="confirmNewCycle()" style="flex: 1; padding: 11px; background: var(--green); border: none; border-radius: 10px; color: #fff; font-size: 14px; font-weight: 600; cursor: pointer">Start Cycle</button>
                </div>
            </div>
        </div>

    </body>
</html>
